# Antigravity Model Switching Logic - V3.2 (Cost & Token Optimized)
# Environment: Production | Tier: Enterprise

routing_engine:
  version: "3.2"
  global_default: "google/gemini-3-flash"

  # --- CONFIGURACIÓN DE TOKEN CAP (Presupuesto) ---
  token_management:
    daily_budget_usd: 50.00 # Límite de gasto diario estimado
    enforcement: "DEGRADE"  # Opciones: BLOCK (error) o DEGRADE (fuerza Gemini Flash)
    reset_timezone: "UTC"

  agents:
    # --- Project Management Agent (@pm) ---
    - id: "@pm"
      mode: "PLANNING"
      token_cap_daily: 500000 # ~0.5M tokens en Opus son caros
      logic_thresholds:
        - prompt_size: "< 1000"
          best_model: "anthropic/claude-4-6-sonnet-thinking" # Ahorro: Sonnet para dudas simples
        - prompt_size: ">= 1000"
          best_model: "anthropic/claude-4-6-opus-thinking"   # Calidad: Opus para specs densas
      fallback: "google/gemini-3-1-pro-high"
      default: "google/gemini-3-flash"

    # --- Senior Engineering Agent (@engineer) ---
    - id: "@engineer"
      mode: "PLANNING"
      token_cap_daily: 1000000
      logic_thresholds:
        - prompt_size: "< 2000"
          best_model: "anthropic/claude-4-6-sonnet-thinking"
        - prompt_size: ">= 2000"
          best_model: "google/gemini-3-1-pro-high" # Contexto grande para refactorizaciones
      fallback: "google/gemini-3-flash"
      default: "google/gemini-3-flash"

    # --- Quality Assurance (@qa) ---
    - id: "@qa"
      mode: "PLANNING"
      token_cap_daily: 2000000 # Ventana amplia requerida
      best_model: "google/gemini-3-1-pro-high"
      fallback: "google/gemini-3-flash"
      default: "google/gemini-3-flash"

    # --- DevOps (@devops) ---
    - id: "@devops"
      mode: "FAST"
      token_cap_daily: 300000
      best_model: "google/gemini-3-flash" # Siempre rápido/barato
      fallback: "google/gemini-3-1-pro-high"
      default: "google/gemini-3-flash"

    # --- Sentinel (@sentinel) ---
    - id: "@sentinel"
      mode: "PLANNING"
      token_cap_daily: 2000000
      best_model: "google/gemini-3-1-pro-high"
      fallback: "anthropic/claude-4-6-sonnet-thinking"
      default: "google/gemini-3-flash"

# --- REGLAS DE OPTIMIZACIÓN BASADAS EN TOKEN-BASED SWITCHING ---
optimization_rules:
  - id: "large_context_protection"
    condition: "input.total_tokens > 100000"
    force_action: "google/gemini-3-1-pro-high" # Solo Gemini Pro aguanta contextos masivos eficientemente